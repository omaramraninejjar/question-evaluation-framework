# Evaluation Framework — Runtime Settings

# ── Scoring ────────────────────────────────────────────────────────────────
scoring:
  # Strategy used by Scorer to aggregate dimension/aspect scores
  # Options: weighted_average | min_gate | percentile_rank
  strategy: weighted_average

  # Score range for all metrics (normalised internally to 0.0–1.0)
  score_min: 0.0
  score_max: 1.0

  # Dimensions whose score, if below critical_threshold, caps the parent aspect
  critical_dimensions:
    - harmful_content_risk
    - privacy_risk
  critical_threshold: 0.2

  # Overall score below which a question is flagged for human review
  flag_threshold: 0.4


# ── Pipeline ───────────────────────────────────────────────────────────────
pipeline:
  # Number of parallel workers for batch evaluation
  max_workers: 4

  # Cache evaluated results to avoid re-running unchanged questions
  cache_enabled: true
  cache_dir: data/results/.cache

  # Stop processing a batch after this many consecutive failures
  max_consecutive_failures: 10


# ── LLM (for LLM-backed metrics, added later) ──────────────────────────────
llm:
  provider: anthropic          # anthropic | openai | local
  model: claude-sonnet-4-20250514
  max_tokens: 1024
  temperature: 0.0             # Deterministic for reproducibility
  timeout_seconds: 30
  retries: 3


# ── Reporting ──────────────────────────────────────────────────────────────
reporting:
  # Output formats to generate after a pipeline run
  formats:
    - json
    - markdown

  output_dir: data/results

  # Include per-metric rationale strings in the output
  include_rationale: true

  # Include raw metric metadata blobs
  include_metadata: false

  # Decimal places for all reported scores
  score_precision: 4


# ── Logging ───────────────────────────────────────────────────────────────
logging:
  level: INFO                  # DEBUG | INFO | WARNING | ERROR
  log_to_file: false
  log_file: logs/eval.log